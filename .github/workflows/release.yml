name: Release

# Publishes to PyPI when you push a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in the repo.
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   Project name:   resume-tailor-mcp
#   Owner:          NmaaAlhawary
#   Repository:     MCP-Resume-Tailor
#   Workflow name:  release.yml
#   Environment:    pypi

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Validate metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
