<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Resume-Tailor MCP logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D97757"/>
      <stop offset="1" stop-color="#6E56CF"/>
    </linearGradient>
    <linearGradient id="thread" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#E08A63"/>
      <stop offset="1" stop-color="#7C63D8"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b9bec9"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1a1030" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- app-icon background -->
  <rect x="16" y="16" width="480" height="480" rx="118" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="240" rx="118" fill="url(#sheen)"/>

  <!-- resume sheet -->
  <g filter="url(#ds)">
    <path d="M154 116 h146 l60 60 v198 a24 24 0 0 1 -24 24 H154 a24 24 0 0 1 -24 -24 V140 a24 24 0 0 1 24 -24 Z" fill="#ffffff"/>
    <!-- folded corner -->
    <path d="M300 116 l60 60 h-44 a16 16 0 0 1 -16 -16 Z" fill="#ded6f2"/>
  </g>

  <!-- text lines -->
  <g fill="#cfd4de">
    <rect x="170" y="190" width="118" height="16" rx="8"/>
    <rect x="170" y="222" width="150" height="14" rx="7"/>
    <rect x="170" y="254" width="92"  height="14" rx="7"/>
  </g>

  <!-- stitched thread forming a check: tailored + ATS-matched -->
  <path d="M172 320 L224 372 L342 258"
        fill="none" stroke="url(#thread)" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="20 20"/>

  <!-- needle at the thread's tip, breaking past the sheet edge -->
  <g stroke-linecap="round">
    <line x1="342" y1="258" x2="406" y2="188" stroke="url(#steel)" stroke-width="13"/>
    <circle cx="398" cy="196" r="12" fill="none" stroke="url(#steel)" stroke-width="8"/>
  </g>
</svg>
