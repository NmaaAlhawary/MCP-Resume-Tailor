<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Resume-Tailor MCP logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D97757"/>
      <stop offset="1" stop-color="#6E56CF"/>
    </linearGradient>
    <linearGradient id="thread" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D97757"/>
      <stop offset="1" stop-color="#6E56CF"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- app-icon background -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>
  <!-- subtle top highlight -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="#fff" opacity="0.06"/>

  <!-- résumé sheet -->
  <g filter="url(#ds)">
    <path d="M150 120 h150 l62 62 v210 a20 20 0 0 1 -20 20 H150 a20 20 0 0 1 -20 -20 V140 a20 20 0 0 1 20 -20 Z" fill="#ffffff"/>
    <!-- folded corner -->
    <path d="M300 120 l62 62 h-46 a16 16 0 0 1 -16 -16 Z" fill="#e7e0f5"/>
  </g>

  <!-- text lines -->
  <g fill="#c9cfda">
    <rect x="168" y="196" width="120" height="16" rx="8"/>
    <rect x="168" y="230" width="150" height="14" rx="7"/>
    <rect x="168" y="262" width="96"  height="14" rx="7"/>
  </g>

  <!-- tailor's stitched seam through the sheet -->
  <path d="M176 320 L336 320" stroke="url(#thread)" stroke-width="12" stroke-linecap="round" stroke-dasharray="4 26"/>

  <!-- needle -->
  <g stroke="url(#thread)" stroke-linecap="round" fill="none">
    <line x1="150" y1="346" x2="352" y2="300" stroke-width="14"/>
  </g>
  <!-- needle eye -->
  <circle cx="342" cy="302" r="15" fill="none" stroke="url(#thread)" stroke-width="10"/>
  <!-- thread tail -->
  <path d="M150 346 q-30 20 -46 -2 q26 -6 20 -26" fill="none" stroke="url(#thread)" stroke-width="10" stroke-linecap="round"/>
</svg>
